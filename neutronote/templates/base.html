<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}neutroNote{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <!-- Plotly.js for interactive plots (defer to avoid blocking page render) -->
    <script defer src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Page-loading overlay (shown during navigation to hide Plotly re-render delay) -->
    <div id="page-loading-overlay" class="page-loading-overlay" style="display:none;">
        <div class="page-loading-spinner">Loading…</div>
    </div>
    <header class="app-header">
        <h1 class="app-title">🧪 neutroNote{% if current_ipts %} <span class="ipts-badge">IPTS-{{ current_ipts }}</span>{% endif %}</h1>
        <nav class="app-nav">
            <a href="{{ url_for('entries.index') }}">Notebook</a>
            <!-- Future: tags, search, user menu -->
        </nav>
    </header>
    
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <!-- KaTeX JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });"></script>
    {% block scripts %}{% endblock %}
    <script>
    // Show loading overlay during page navigations (hides Plotly re-render delay)
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('page-loading-overlay').style.display = 'none';
    });
    window.addEventListener('beforeunload', function() {
        document.getElementById('page-loading-overlay').style.display = 'flex';
    });
    </script>
</body>
</html>
